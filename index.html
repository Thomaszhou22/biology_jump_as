            <div class="modal-field">

            <button type="button" id="start-game-btn">Start Game</button>
        </div>
    </div>

    <div id="result-overlay" role="dialog" aria-modal="true" aria-labelledby="result-title" aria-hidden="true">

            <p id="winner-name" class="result-winner-line"></p>

                    <ul>

                        <li>错误：<span id="p1-wrong">0</span></li>
                        <li id="p1-acc-line" class="result-acc">正确率：—</li>
                    </ul>
                </div>
                <div class="player-card player2-card">

                </div>
            </div>
            <button type="button" id="result-restart-btn">重新开始游戏</button>
        </div>
    </div>

    <div id="admin-overlay" role="dialog" aria-modal="true" aria-label="Admin" aria-hidden="true">
        <div id="admin-panel">
            <button type="button" id="toggle-answer-test-btn">All Answers Correct: OFF</button>
            <button type="button" id="admin-close">Close</button>
        </div>

    <h1>🧬 AS Biology Quiz</h1>

function zoomImage(src) {
    const overlay = document.createElement('div');
    overlay.className = 'image-overlay';
    overlay.onclick = () => overlay.remove();
    const img = document.createElement('img');
    img.src = src;
    overlay.appendChild(img);
    document.body.appendChild(overlay);

// --- Wrong Book ---
const WRONG_BOOK_KEY = 'organic-jump-wrong-book';
const WRONG_BOOK_SESSION_KEY = 'organic-jump-wrong-book-session';

if (!sessionStorage.getItem(WRONG_BOOK_SESSION_KEY)) {
    try { localStorage.removeItem(WRONG_BOOK_KEY); } catch (e) {}
    sessionStorage.setItem(WRONG_BOOK_SESSION_KEY, '1');
}

function getWrongBook() {
    try { return JSON.parse(localStorage.getItem(WRONG_BOOK_KEY) || '[]'); } catch { return []; }
}
function saveWrongBook(records) {
    try { localStorage.setItem(WRONG_BOOK_KEY, JSON.stringify(records)); } catch (e) {}
}
function addWrongQuestionRecord(playerSide) {
    if (!currentQuestionItem) return;
    const playerNameSnapshot = playerSide === 'red' ? String(player1Name || '') : String(player2Name || '');
    const records = getWrongBook();
    records.push({
        player: playerNameSnapshot, side: playerSide,
        question: currentQuestionItem.q, img: !!currentQuestionItem.img,
        questionIndex: deepQuestions.indexOf(currentQuestionItem) + 1,
        answer: currentQuestionItem.a, timestamp: Date.now()
    });
    saveWrongBook(records);
}
function escapeHtml(str) {
    return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
}
function renderWrongBook() {
    const container = document.getElementById('wrong-book-list');
    const records = getWrongBook();
    if (!records.length) { container.innerHTML = '<p>No wrong questions yet.</p>'; return; }
    const byPlayer = new Map();
    for (const item of records) {
        const key = item.player != null ? String(item.player) : '';
        if (!byPlayer.has(key)) byPlayer.set(key, []);
        byPlayer.get(key).push(item);
    }
    const names = [...byPlayer.keys()].sort((a, b) => { if (a === '' && b !== '') return 1; if (b === '' && a !== '') return -1; return a.localeCompare(b, 'zh-CN'); });
    for (const name of names) byPlayer.get(name).sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    function renderItem(item, i) {
        return `<div class="wrong-book-item"><div class="wrong-book-meta"><strong>#${i+1}</strong></div><div class="wrong-book-question"><b>Q${item.questionIndex||'?'}:</b> ${item.img ? '<img src="questions/'+escapeHtml(item.question)+'" style="max-width:200px;border-radius:4px;cursor:zoom-in;" onclick="zoomImage(this.src)">' : escapeHtml(item.question)}</div><div class="wrong-book-answer"><b>Answer:</b> ${escapeHtml(item.answer)}</div></div>`;
    }
    container.innerHTML = names.map(name => {
        const list = byPlayer.get(name);
        return `<section class="wrong-book-section"><div class="wrong-book-section-title">${escapeHtml(name===''?'（未命名）':name)}<span class="wrong-book-count">共 ${list.length} 题</span></div><div class="wrong-book-section-items">${list.map(renderItem).join('')}</div></section>`;
    }).join('');
}
function openWrongBook() { renderWrongBook(); const o=document.getElementById('wrong-book-overlay'); o.style.display='flex'; o.setAttribute('aria-hidden','false'); }
function closeWrongBook() { const o=document.getElementById('wrong-book-overlay'); o.style.display='none'; o.setAttribute('aria-hidden','true'); }
function clearAllWrongBook() { if(!window.confirm('确定要清空错题本中的全部记录吗？\n此操作无法撤销。'))return; saveWrongBook([]); renderWrongBook(); }

// --- Quiz State ---
let currentPlayer = 1;
let player1Name = '';
let player2Name = '';
let player1Answered = 0, player1Wrong = 0;
let player2Answered = 0, player2Wrong = 0;
let currentQuestionItem = null;
let isAnswering = false;
const RECENT_QUESTION_WINDOW = 5;
let recentQuestionIndices = [];
let quizStarted = false;
const QUIZ_PROGRESS_KEY = 'as-quiz-progress';

let testAllAnswersCorrect = (function() { try { return localStorage.getItem('allAnswersCorrectMode') === 'true'; } catch(e) { return false; } })();

function pickRandomQuestionIndex() {
    const n = deepQuestions.length;
    const banned = new Set(recentQuestionIndices);
    const candidates = [];
    for (let i = 0; i < n; i++) { if (!banned.has(i)) candidates.push(i); }
    const pool = candidates.length > 0 ? candidates : Array.from({ length: n }, (_, i) => i);
    return pool[Math.floor(Math.random() * pool.length)];
}

function updatePlayerDisplay() {
    const label = document.getElementById('player-display');
    label.textContent = getPlayerName(currentPlayer) + ' 的回合';
    label.style.color = currentPlayer === 1 ? '#ff4757' : '#2e86de';
}

function updateStatsBar() {
    const a = currentPlayer === 1 ? player1Answered : player2Answered;
    const w = currentPlayer === 1 ? player1Wrong : player2Wrong;
    document.getElementById('stats-answered').textContent = '作答: ' + a;
    document.getElementById('stats-correct').textContent = '正确: ' + (a - w);
    document.getElementById('stats-wrong').textContent = '错误: ' + w;
}

function getPlayerName(num) { return num === 1 ? player1Name : player2Name; }

function winnerDisplayName(num) { const n = (num === 1 ? player1Name : player2Name).trim(); return n || (num === 1 ? '玩家 1' : '玩家 2'); }

function saveQuizProgress() {
  if (!quizStarted) return;
  try {
    localStorage.setItem(QUIZ_PROGRESS_KEY, JSON.stringify({
      currentPlayer,
      player1Answered, player1Wrong,
      player2Answered, player2Wrong,
      currentQuestionIndex: currentQuestionItem ? deepQuestions.indexOf(currentQuestionItem) : -1,
      recentQuestionIndices
    }));
  } catch (e) {}
}
function clearQuizProgress() {
  try { localStorage.removeItem(QUIZ_PROGRESS_KEY); } catch (e) {}
}
function loadQuizProgress() {
  try {
    const raw = localStorage.getItem(QUIZ_PROGRESS_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function showMsg(t, c) { const m = document.getElementById('msg'); m.textContent = t; m.className = 'status-msg ' + c; m.style.display = 'block'; }

function clearQuestionDisplay() {
    document.getElementById('q-image').style.display = 'none';
    document.getElementById('zoom-hint').style.display = 'none';
}

function loadNextQuestion() {
    const idx = pickRandomQuestionIndex();
    currentQuestionItem = deepQuestions[idx];
    recentQuestionIndices.push(idx);
    if (recentQuestionIndices.length > RECENT_QUESTION_WINDOW) recentQuestionIndices.shift();
    renderCurrentQuestion();
    isAnswering = true;
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('end-quiz-btn').style.display = 'block';
    document.getElementById('msg').style.display = 'none';
}

function renderCurrentQuestion() {
    const item = currentQuestionItem;
    if (!item) return;
    document.getElementById('q-text').innerHTML = item.img
        ? `<b>Q${deepQuestions.indexOf(item)+1}：</b>`
        : `<b>题目：</b><br>${item.q}`;
    const qImg = document.getElementById('q-image');
    const hint = document.getElementById('zoom-hint');
    if (item.img) {
        qImg.src = 'questions/' + item.q;
        qImg.style.display = 'block';
        if (hint) hint.style.display = 'block';
    } else {
        qImg.style.display = 'none';
        if (hint) hint.style.display = 'none';
    }
    const opt = document.getElementById('options');
    opt.innerHTML = '';
    const row = document.createElement('div');
    row.className = 'options-row';
    ['A', 'B', 'C', 'D'].forEach(letter => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = letter;
        btn.onclick = () => {
            if (!isAnswering) return;
            const qItem = currentQuestionItem;
            const correct = testAllAnswersCorrect ? true : (letter === qItem.a);
            // Record
            if (currentPlayer === 1) { player1Answered++; if (!correct) player1Wrong++; }
            else { player2Answered++; if (!correct) player2Wrong++; }
            updateStatsBar();
            // Disable all buttons
            opt.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            if (correct) {
                showMsg("✅ 正确！", "correct");
            } else {
                addWrongQuestionRecord(currentPlayer === 1 ? 'red' : 'blue');
                showMsg(`❌ 错误！正确答案是: ${qItem.a}`, 'incorrect');
            }
            isAnswering = false;
            document.getElementById('next-btn').style.display = 'block';
        };
        row.appendChild(btn);
    });
    opt.appendChild(row);
}

function handleNext() {
    currentPlayer = currentPlayer === 1 ? 2 : 1;
    updatePlayerDisplay();
    updateStatsBar();
    loadNextQuestion();
    saveQuizProgress();
}

function resetStats() { player1Answered = 0; player1Wrong = 0; player2Answered = 0; player2Wrong = 0; }

// --- Result Modal ---
function showResultModal(winnerNum) {
    document.getElementById('winner-name').textContent = '答题结束';
    document.getElementById('result-p1-name').textContent = '玩家 1 / ' + winnerDisplayName(1);
    document.getElementById('result-p2-name').textContent = '玩家 2 / ' + winnerDisplayName(2);
    document.getElementById('p1-answered').textContent = player1Answered;
    document.getElementById('p1-wrong').textContent = player1Wrong;
    document.getElementById('p2-answered').textContent = player2Answered;
    document.getElementById('p2-wrong').textContent = player2Wrong;
    const acc1 = player1Answered > 0 ? Math.round(((player1Answered - player1Wrong) / player1Answered) * 100) + '%' : '—';
    const acc2 = player2Answered > 0 ? Math.round(((player2Answered - player2Wrong) / player2Answered) * 100) + '%' : '—';
    document.getElementById('p1-acc-line').textContent = '正确率：' + acc1;
    document.getElementById('p2-acc-line').textContent = '正确率：' + acc2;
    const ro = document.getElementById('result-overlay'); ro.style.display = 'flex'; ro.setAttribute('aria-hidden', 'false');
}
function hideResultOverlay() { const ro = document.getElementById('result-overlay'); ro.style.display = 'none'; ro.setAttribute('aria-hidden', 'true'); }

function endQuiz() {
    isAnswering = false;
    quizStarted = false;
    clearQuizProgress();
    clearQuestionDisplay();
    document.getElementById('q-text').textContent = '等待开始...';
    document.getElementById('options').innerHTML = '';
    document.getElementById('msg').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('end-quiz-btn').style.display = 'none';
    resetStats();
    recentQuestionIndices = [];
    currentPlayer = 1;
    updatePlayerDisplay();
    updateStatsBar();
}

// --- Name Modal ---
function loadSavedPlayerNames() {
    try {
        const s1 = localStorage.getItem('player1Name'); const s2 = localStorage.getItem('player2Name');
        const n1 = s1 != null ? String(s1).trim() : ''; const n2 = s2 != null ? String(s2).trim() : '';
        if (n1 && n2) { player1Name = n1; player2Name = n2; return true; }
    } catch (e) {}
    return false;
}
function prefillModalInputs() {
    try {
        const s1 = localStorage.getItem('player1Name'); const s2 = localStorage.getItem('player2Name');
        const el1 = document.getElementById('red-name-input'); const el2 = document.getElementById('blue-name-input');
        if (s1 != null && s1 !== '') el1.value = String(s1).trim();
        if (s2 != null && s2 !== '') el2.value = String(s2).trim();
    } catch (e) {}
}
function openNameModal(prefill) {
    document.getElementById('name-modal-warning').textContent = '';
    document.getElementById('name-modal').style.display = 'flex';
    const el1 = document.getElementById('red-name-input'); const el2 = document.getElementById('blue-name-input');
    if (prefill) { el1.value = player1Name || ''; el2.value = player2Name || ''; }
    else { el1.value = ''; el2.value = ''; prefillModalInputs(); }
}
function nameInputTriggersAdmin(t) { return t === '/' || (t.length > 1 && t.endsWith('/')); }
function confirmNameModal() {
    const w = document.getElementById('name-modal-warning');
    const n1 = document.getElementById('red-name-input').value.trim();
    const n2 = document.getElementById('blue-name-input').value.trim();
    if (nameInputTriggersAdmin(n1) || nameInputTriggersAdmin(n2)) { w.textContent = ''; openAdminPanel(); return; }
    if (!n1 || !n2) { w.textContent = '请填写双方名称后再开始。'; return; }
    w.textContent = '';
    player1Name = n1; player2Name = n2;
    try { localStorage.setItem('player1Name', n1); localStorage.setItem('player2Name', n2); } catch (e) {}
    document.getElementById('name-modal').style.display = 'none';
    startQuiz();
}

function startQuiz(fromProgress) {
    hideResultOverlay();
    if (!fromProgress) { resetStats(); recentQuestionIndices = []; currentPlayer = 1; }
    quizStarted = true;
    clearQuestionDisplay();
    document.getElementById('msg').style.display = 'none';
    updatePlayerDisplay();
    updateStatsBar();
    loadNextQuestion();
}

function restartGame() {
    hideResultOverlay();
    clearQuizProgress();
    resetStats();
    recentQuestionIndices = [];
    currentPlayer = 1;
    startQuiz();
}

// --- Admin ---
function openAdminPanel() { const o = document.getElementById('admin-overlay'); o.style.display = 'flex'; o.setAttribute('aria-hidden', 'false'); }
function closeAdminPanel() { const o = document.getElementById('admin-overlay'); o.style.display = 'none'; o.setAttribute('aria-hidden', 'true'); stripTrailingSlashFromNameInputs(); }
function stripTrailingSlashFromNameInputs() {
    ['red-name-input','blue-name-input'].forEach(function(id) {
        const el = document.getElementById(id); if (!el) return;
        const v = el.value; if (v.trim()==='/') el.value=''; else if (v.trim().endsWith('/')) el.value = v.replace(/\s*\/+\s*$/,'');
    });
}
function setupNameInputAdminTrigger(input) {
    input.addEventListener('keydown', function(e) {
        if (e.key!=='Enter') return; const t=input.value.trim();
        if (!nameInputTriggersAdmin(t)) return; e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation(); openAdminPanel();
    }, true);
}
function updateAnswerTestToggleButton() {
    const btn = document.getElementById('toggle-answer-test-btn');
    btn.textContent = testAllAnswersCorrect ? 'All Answers Correct: ON' : 'All Answers Correct: OFF';
    btn.classList.toggle('is-on', testAllAnswersCorrect);
}

// --- Event Bindings ---
document.getElementById('next-btn').onclick = handleNext;
document.getElementById('end-quiz-btn').onclick = endQuiz;
document.getElementById('restart-btn').onclick = restartGame;
document.getElementById('result-restart-btn').onclick = restartGame;
document.getElementById('change-names-btn').onclick = function() { openNameModal(true); };
document.getElementById('wrong-book-btn').onclick = openWrongBook;
document.getElementById('wrong-book-clear-all').onclick = clearAllWrongBook;
document.getElementById('wrong-book-close').onclick = closeWrongBook;
document.getElementById('wrong-book-panel').addEventListener('click', function(e) { e.stopPropagation(); });
document.getElementById('wrong-book-overlay').addEventListener('click', function() { closeWrongBook(); });
document.getElementById('start-game-btn').onclick = confirmNameModal;
document.getElementById('toggle-answer-test-btn').onclick = function() {
    testAllAnswersCorrect = !testAllAnswersCorrect;
    try { localStorage.setItem('allAnswersCorrectMode', String(testAllAnswersCorrect)); } catch(e) {}
    updateAnswerTestToggleButton();
};
updateAnswerTestToggleButton();
setupNameInputAdminTrigger(document.getElementById('red-name-input'));
setupNameInputAdminTrigger(document.getElementById('blue-name-input'));
document.getElementById('admin-panel').addEventListener('click', function(e) { e.stopPropagation(); });
document.getElementById('admin-overlay').addEventListener('click', function() { closeAdminPanel(); });
document.getElementById('admin-close').onclick = closeAdminPanel;
document.addEventListener('keydown', function(e) {
    if (e.key !== 'Escape') return;
    const wb = document.getElementById('wrong-book-overlay'); if (wb && wb.style.display === 'flex') { closeWrongBook(); return; }
    const ao = document.getElementById('admin-overlay'); if (ao && ao.style.display === 'flex') closeAdminPanel();
});

// --- Boot ---
(function bootGame() {
    if (loadSavedPlayerNames()) {
        document.getElementById('name-modal').style.display = 'none';
        const progress = loadQuizProgress();
        if (progress && progress.currentQuestionIndex >= 0) {
            currentPlayer = progress.currentPlayer;
            player1Answered = progress.player1Answered;
            player1Wrong = progress.player1Wrong;
            player2Answered = progress.player2Answered;
            player2Wrong = progress.player2Wrong;
            currentQuestionItem = deepQuestions[progress.currentQuestionIndex] || null;
            recentQuestionIndices = progress.recentQuestionIndices || [];
            startQuiz(true);
        } else {
            updatePlayerDisplay();
            updateStatsBar();
        }
    } else {
        openNameModal(false);
    }
})();
