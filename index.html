<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>AS Biology Quiz</title>
    <style>
        body { font-family: 'PingFang SC', sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; margin: 0; padding: 20px; }
        #quiz-container { width: 480px; max-width: 95vw; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 10px; }
        #header-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
        #progress-bar { width: 100%; background: #e9ecef; border-radius: 10px; overflow: hidden; height: 8px; display: none; margin-bottom: 10px; }
        #progress-fill { height: 100%; background: #007bff; border-radius: 10px; transition: width 0.3s; width: 0%; }
        #score-display { display: none; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 10px; font-size: 14px; color: #555; }
        #score-display span { background: #f0f2f5; padding: 4px 12px; border-radius: 20px; }
        #question-counter { font-weight: bold; font-size: 15px; text-align: center; }
        #question-box { border-radius: 8px; background: #f8f9fa; padding: 15px; margin: 15px 0; border-left: 5px solid #007bff; min-height: 140px; }
        #q-text { margin-bottom: 8px; }
        #q-image { max-width: 100%; max-height: 300px; border-radius: 6px; margin: 8px 0; display: block; margin-left: auto; margin-right: auto; cursor: zoom-in; transition: opacity 0.2s; }
        .zoom-hint { text-align: center; margin-top: 4px; }
        .zoom-btn { display: block; margin: 6px auto 0; padding: 6px 16px; border: 1px solid #ccc; border-radius: 6px; background: #f0f0f0; font-size: 13px; cursor: pointer; color: #555; }
        .zoom-btn:hover { background: #e0e0e0; }
        .image-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: zoom-out; }
        .image-overlay img { max-width: 95vw; max-height: 95vh; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
        .option-btn { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; text-align: center; transition: 0.2s; font-size: 15px; font-weight: bold; }
        .option-btn:hover:not(:disabled) { background: #eef2f7; border-color: #007bff; }
        .options-row { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
        .option-btn.correct-answer { background: #d4edda; border-color: #28a745; color: #155724; }
        .option-btn.wrong-answer { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        .status-msg { font-weight: bold; text-align: center; padding: 10px; border-radius: 6px; margin-top: 10px; display: none; }
        .status-msg.correct { background: #d4edda; color: #155724; }
        .status-msg.incorrect { background: #f8d7da; color: #721c24; }
        #info-panel { text-align: center; padding: 30px 0; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; background: #2f3542; color: white; margin-top: 16px; }
        .btn-action:hover { background: #1e2229; }
        #wrong-book-btn { position: fixed; right: 15px; top: 15px; z-index: 1000; padding: 8px 14px; border-radius: 8px; border: 1px solid #d1d8e0; background: #fff; color: #333; font-size: 13px; font-family: inherit; font-weight: bold; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.12); transition: background 0.2s, transform 0.2s; }
        #wrong-book-btn:hover { background: #eef2f7; transform: scale(1.05); }
        #wrong-book-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3500; padding: 20px; box-sizing: border-box; }
        #wrong-book-panel { background: #fff; border-radius: 16px; padding: 20px; width: min(900px, 92vw); max-height: 85vh; overflow: auto; box-shadow: 0 12px 40px rgba(0,0,0,0.35); }
        #wrong-book-panel h2 { margin: 0 0 16px; font-size: 1.25rem; text-align: center; }
        #wrong-book-list { margin-bottom: 16px; }
        .wrong-book-item { border: 1px solid #ddd; border-radius: 12px; padding: 14px; margin-bottom: 14px; text-align: left; }
        .wrong-book-meta { display: flex; flex-wrap: wrap; gap: 12px; align-items: baseline; margin-bottom: 10px; font-size: 0.95rem; }
        .wrong-book-item .wrong-book-meta strong { margin-right: 6px; }
        .wrong-book-question { margin-bottom: 10px; }
        .wrong-book-answer { font-size: 0.95rem; }
        .wrong-book-footer-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .wrong-book-footer-actions button { flex: 1; min-width: 120px; padding: 10px 14px; border-radius: 8px; border: 1px solid #d1d8e0; background: #f8f9fa; font-family: inherit; font-size: 14px; font-weight: bold; cursor: pointer; }
        .wrong-book-footer-actions button:hover { background: #eef2f7; }
        #wrong-book-clear-all { border-color: #e8b4b4; background: #fff5f5; color: #a61e1e; }
        #wrong-book-clear-all:hover { background: #ffe8e8; border-color: #d64545; }
        #admin-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 4000; padding: 20px; }
        #admin-panel { background: #fff; border-radius: 14px; padding: 24px 28px; max-width: 360px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.35); display: flex; flex-direction: column; gap: 8px; }
        #admin-panel button { display: block; width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #d1d8e0; background: #f8f9fa; font-family: inherit; font-size: 14px; font-weight: bold; cursor: pointer; }
        #admin-panel button:hover { background: #eef2f7; }
        #admin-panel #toggle-answer-test-btn.is-on { background: #e8f5e9; border-color: #43a047; color: #1b5e20; }
        #finish-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none; align-items: center; justify-content: center; z-index: 3000; }
        #finish-modal { background: #fff; border-radius: 16px; padding: 28px 32px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 16px 48px rgba(0,0,0,0.22); }
        #finish-modal h2 { margin: 0 0 16px; }
        #finish-stats { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; font-size: 15px; color: #444; }
    </style>
</head>
<body>

    <button type="button" id="wrong-book-btn">错题本</button>

    <div id="wrong-book-overlay" role="dialog" aria-modal="true" aria-label="错题本" aria-hidden="true">
        <div id="wrong-book-panel">
            <h2 id="wrong-book-title">错题本</h2>
            <div id="wrong-book-list"></div>
            <div class="wrong-book-footer-actions">
                <button type="button" id="wrong-book-clear-all">清空全部</button>
                <button type="button" id="wrong-book-close">关闭</button>
            </div>
        </div>
    </div>

    <div id="admin-overlay" role="dialog" aria-modal="true" aria-label="Admin" aria-hidden="true">
        <div id="admin-panel">
            <button type="button" id="toggle-answer-test-btn">All Answers Correct: OFF</button>
            <button type="button" id="admin-close">Close</button>
        </div>
    </div>

    <div id="finish-overlay" role="dialog" aria-modal="true" aria-label="答题完成" aria-hidden="true">
        <div id="finish-modal">
            <h2>🎉 答题完成</h2>
            <div id="finish-stats">
                <p>总题数: <strong id="finish-total">0</strong></p>
                <p>✅ 正确: <strong id="finish-correct">0</strong></p>
                <p>❌ 错误: <strong id="finish-wrong">0</strong></p>
                <p>正确率: <strong id="finish-acc">—</strong></p>
            </div>
            <button type="button" class="btn-action" id="finish-restart-btn">重新开始</button>
        </div>
    </div>

    <div id="quiz-container">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="score-display">
            <span>✅ <span id="correct-count">0</span></span>
            <span>❌ <span id="wrong-count">0</span></span>
            <span>剩余 <span id="remaining-count">0</span></span>
        </div>
        <div id="question-counter">请点击开始答题</div>
        <div id="question-box">
            <div id="q-text">点击下方按钮开始答题</div>
            <img id="q-image" style="display:none;" onclick="zoomImage(this.src)" />
            <div id="zoom-hint" class="zoom-hint" style="display:none;"><button class="zoom-btn" onclick="zoomImage(document.getElementById('q-image').src)">放大图片</button></div>
            <div id="options"></div>
            <div id="msg" class="status-msg"></div>
        </div>
        <div id="info-panel">
            <button type="button" class="btn-action" id="start-btn">开始答题</button>
            <button type="button" class="btn-action" id="abort-btn" style="background:#c0392b;display:none;">终止答题</button>
            <button type="button" id="restart-btn" class="btn-action" style="background:none;border:1px solid #d1d8e0;color:#999;font-size:12px;margin-top:60px;display:none;">重新开始</button>
        </div>
    </div>

<script>
const deepQuestions = [
  { q: 'q01.jpg', img: true, a: 'D' },
  { q: 'q02.jpg', img: true, a: 'C' },
  { q: 'q03.jpg', img: true, a: 'A' },
  { q: 'q04.jpg', img: true, a: 'C' },
  { q: 'q05.jpg', img: true, a: 'D' },
  { q: 'q06.jpg', img: true, a: 'C' },
  { q: 'q07.jpg', img: true, a: 'C' },
  { q: 'q08.jpg', img: true, a: 'A' },
  { q: 'q09.jpg', img: true, a: 'C' },
  { q: 'q10.jpg', img: true, a: 'D' },
  { q: 'q11.jpg', img: true, a: 'A' },
  { q: 'q12.jpg', img: true, a: 'B' },
  { q: 'q13.jpg', img: true, a: 'B' },
  { q: 'q14.jpg', img: true, a: 'C' },
  { q: 'q15.jpg', img: true, a: 'A' },
  { q: 'q16.jpg', img: true, a: 'D' },
  { q: 'q17.jpg', img: true, a: 'B' },
  { q: 'q18.jpg', img: true, a: 'B' },
  { q: 'q19.jpg', img: true, a: 'C' },
  { q: 'q20.jpg', img: true, a: 'B' },
  { q: 'q21.jpg', img: true, a: 'A' },
  { q: 'q22.jpg', img: true, a: 'D' },
  { q: 'q23.jpg', img: true, a: 'B' },
  { q: 'q24.jpg', img: true, a: 'D' },
  { q: 'q25.jpg', img: true, a: 'D' },
  { q: 'q26.jpg', img: true, a: 'B' },
  { q: 'q27.jpg', img: true, a: 'A' },
  { q: 'q28.jpg', img: true, a: 'D' },
  { q: 'q29.jpg', img: true, a: 'D' },
  { q: 'q30.jpg', img: true, a: 'B' },
  { q: 'q31.jpg', img: true, a: 'C' },
  { q: 'q32.jpg', img: true, a: 'C' },
  { q: 'q33.jpg', img: true, a: 'B' },
  { q: 'q34.jpg', img: true, a: 'C' },
  { q: 'q35.jpg', img: true, a: 'D' },
  { q: 'q36.jpg', img: true, a: 'A' },
  { q: 'q37.jpg', img: true, a: 'C' },
  { q: 'q38.jpg', img: true, a: 'C' },
  { q: 'q39.jpg', img: true, a: 'D' },
  { q: 'q40.jpg', img: true, a: 'D' },
  { q: 'q41.jpg', img: true, a: 'C' },
  { q: 'q42.jpg', img: true, a: 'A' },
  { q: 'q43.jpg', img: true, a: 'D' },
  { q: 'q44.jpg', img: true, a: 'D' },

function zoomImage(src) {
    const overlay = document.createElement('div');
    overlay.className = 'image-overlay';
    overlay.onclick = () => overlay.remove();
    const img = document.createElement('img');
    img.src = src;
    overlay.appendChild(img);
    document.body.appendChild(overlay);
}

// === Wrong Book ===
const WRONG_BOOK_KEY = 'as-quiz-wrong-book';
function getWrongBook() { try { return JSON.parse(localStorage.getItem(WRONG_BOOK_KEY) || '[]'); } catch { return []; } }
function saveWrongBook(records) { try { localStorage.setItem(WRONG_BOOK_KEY, JSON.stringify(records)); } catch (e) {} }
function addWrongQuestionRecord(qItem, qNumber) {
    if (!qItem) return;
    const records = getWrongBook();
    records.push({ question: qItem.q, img: !!qItem.img, questionIndex: qNumber, answer: qItem.a, timestamp: Date.now() });
    saveWrongBook(records);
}
function escapeHtml(str) { return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;'); }
function renderWrongBook() {
    const container = document.getElementById('wrong-book-list');
    const records = getWrongBook();
    if (!records.length) { container.innerHTML = '<p>暂无错题。</p>'; return; }
    container.innerHTML = records.map((item, i) => `<div class="wrong-book-item"><div class="wrong-book-meta"><strong>#${i+1}</strong></div><div class="wrong-book-question"><b>Q${item.questionIndex||'?'}:</b> ${item.img ? '<img src="questions/'+escapeHtml(item.question)+'" style="max-width:200px;border-radius:4px;cursor:zoom-in;" onclick="zoomImage(this.src)">' : escapeHtml(item.question)}</div><div class="wrong-book-answer"><b>正确答案:</b> ${escapeHtml(item.answer)}</div></div>`).join('');
}
function openWrongBook() { renderWrongBook(); const o=document.getElementById('wrong-book-overlay'); o.style.display='flex'; o.setAttribute('aria-hidden','false'); }
function closeWrongBook() { const o=document.getElementById('wrong-book-overlay'); o.style.display='none'; o.setAttribute('aria-hidden','true'); }
function clearAllWrongBook() { if(!window.confirm('确定要清空错题本中的全部记录吗？\n此操作无法撤销。'))return; saveWrongBook([]); renderWrongBook(); }

// === State ===
let shuffledQuestions = [];
let questionIndex = 0;
let currentQuestionItem = null;
let isAnswering = false;
let totalCorrect = 0;
let totalWrong = 0;

const PROGRESS_KEY = 'as-quiz-progress';

function saveProgress() {
    try {
        localStorage.setItem(PROGRESS_KEY, JSON.stringify({
            shuffledQuestions, questionIndex, totalCorrect, totalWrong,
            currentQuestionIdx: currentQuestionItem ? shuffledQuestions.indexOf(currentQuestionItem) : -1
        }));
    } catch (e) {}
}
function loadProgress() {
    try {
        const d = JSON.parse(localStorage.getItem(PROGRESS_KEY));
        if (d && d.shuffledQuestions && d.shuffledQuestions.length > 0) return d;
    } catch (e) {}
    return null;
}
function clearProgress() { try { localStorage.removeItem(PROGRESS_KEY); } catch (e) {} }

let testAllAnswersCorrect = (function() { try { return localStorage.getItem('allAnswersCorrectMode') === 'true'; } catch(e) { return false; } })();

// === Quiz Logic ===
function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
}

function startQuiz(fromProgress) {
    hideFinishOverlay();
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('abort-btn').style.display = 'block';
    document.getElementById('restart-btn').style.display = 'none';
    document.getElementById('progress-bar').style.display = 'block';
    document.getElementById('score-display').style.display = 'flex';

    if (!fromProgress) {
        shuffledQuestions = shuffleArray(deepQuestions);
        questionIndex = 0;
        totalCorrect = 0;
        totalWrong = 0;
    }
    updateScoreDisplay();
    showNextQuestion();
}

function showNextQuestion() {
    if (questionIndex >= shuffledQuestions.length) { showFinishOverlay(); clearProgress(); return; }
    isAnswering = true;
    currentQuestionItem = shuffledQuestions[questionIndex];
    renderCurrentQuestion();
    updateScoreDisplay();
}

function renderCurrentQuestion() {
    const item = currentQuestionItem;
    if (!item) return;
    document.getElementById('question-counter').textContent = `第 ${questionIndex + 1} / ${shuffledQuestions.length} 题`;
    document.getElementById('q-text').innerHTML = `<b>Q${questionIndex + 1}：</b>`;
    const qImg = document.getElementById('q-image');
    const hint = document.getElementById('zoom-hint');
    if (item.img) {
        qImg.src = 'questions/' + item.q;
        qImg.style.display = 'block';
        if (hint) hint.style.display = 'block';
    } else {
        qImg.style.display = 'none';
        if (hint) hint.style.display = 'none';
    }
    const opt = document.getElementById('options');
    opt.innerHTML = '';
    const row = document.createElement('div');
    row.className = 'options-row';
    ['A', 'B', 'C', 'D'].forEach(letter => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = letter;
        btn.onclick = () => handleAnswer(letter, btn);
        row.appendChild(btn);
    });
    opt.appendChild(row);
}

function handleAnswer(letter, clickedBtn) {
    if (!isAnswering) return;
    isAnswering = false;
    const qItem = currentQuestionItem;
    const correct = testAllAnswersCorrect ? true : (letter === qItem.a);
    const allBtns = document.querySelectorAll('.option-btn');
    allBtns.forEach(b => { b.disabled = true; if (b.textContent === qItem.a) b.classList.add('correct-answer'); });
    if (correct) {
        totalCorrect++;
        showMsg('✅ 正确！', 'correct');
    } else {
        totalWrong++;
        clickedBtn.classList.add('wrong-answer');
        showMsg(`❌ 错误！正确答案是: ${qItem.a}`, 'incorrect');
        addWrongQuestionRecord(qItem, questionIndex + 1);
    }
    updateScoreDisplay();
    setTimeout(() => {
        hideMsg();
        questionIndex++;
        showNextQuestion();
        saveProgress();
    }, 1500);
}

function updateScoreDisplay() {
    const total = totalCorrect + totalWrong;
    const remaining = shuffledQuestions.length - questionIndex;
    document.getElementById('correct-count').textContent = totalCorrect;
    document.getElementById('wrong-count').textContent = totalWrong;
    document.getElementById('remaining-count').textContent = remaining;
    const pct = shuffledQuestions.length > 0 ? Math.round((total / shuffledQuestions.length) * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
}

function showMsg(t, c) { const m = document.getElementById('msg'); m.textContent = t; m.className = 'status-msg ' + c; m.style.display = 'block'; }
function hideMsg() { document.getElementById('msg').style.display = 'none'; }

// === Finish ===
function showFinishOverlay() {
    const total = totalCorrect + totalWrong;
    const acc = total > 0 ? Math.round((totalCorrect / total) * 100) + '%' : '—';
    document.getElementById('finish-total').textContent = total;
    document.getElementById('finish-correct').textContent = totalCorrect;
    document.getElementById('finish-wrong').textContent = totalWrong;
    document.getElementById('finish-acc').textContent = acc;
    document.getElementById('finish-overlay').style.display = 'flex';
    document.getElementById('finish-overlay').setAttribute('aria-hidden', 'false');
}
function hideFinishOverlay() { const o = document.getElementById('finish-overlay'); o.style.display = 'none'; o.setAttribute('aria-hidden', 'true'); }

function abortQuiz() {
    clearProgress();
    isAnswering = false;
    shuffledQuestions = [];
    questionIndex = 0;
    totalCorrect = 0;
    totalWrong = 0;
    document.getElementById('abort-btn').style.display = 'none';
    document.getElementById('restart-btn').style.display = 'none';
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('progress-bar').style.display = 'none';
    document.getElementById('score-display').style.display = 'none';
    document.getElementById('question-counter').textContent = '请点击开始答题';
    document.getElementById('q-text').textContent = '点击下方按钮开始答题';
    document.getElementById('q-image').style.display = 'none';
    document.getElementById('zoom-hint').style.display = 'none';
    document.getElementById('options').innerHTML = '';
    hideMsg();
}

// === Admin ===
function openAdminPanel() { document.getElementById('admin-overlay').style.display = 'flex'; document.getElementById('admin-overlay').setAttribute('aria-hidden', 'false'); }
function closeAdminPanel() { document.getElementById('admin-overlay').style.display = 'none'; document.getElementById('admin-overlay').setAttribute('aria-hidden', 'true'); }
function updateAnswerTestToggleButton() {
    const btn = document.getElementById('toggle-answer-test-btn');
    btn.textContent = testAllAnswersCorrect ? 'All Answers Correct: ON' : 'All Answers Correct: OFF';
    btn.classList.toggle('is-on', testAllAnswersCorrect);
}

// === Init ===
(function init() {
    document.getElementById('start-btn').onclick = () => startQuiz(false);
    document.getElementById('abort-btn').onclick = abortQuiz;
    document.getElementById('finish-restart-btn').onclick = () => { clearProgress(); startQuiz(false); };
    document.getElementById('wrong-book-btn').onclick = openWrongBook;
    document.getElementById('wrong-book-clear-all').onclick = clearAllWrongBook;
    document.getElementById('wrong-book-close').onclick = closeWrongBook;
    document.getElementById('wrong-book-panel').addEventListener('click', e => e.stopPropagation());
    document.getElementById('wrong-book-overlay').addEventListener('click', closeWrongBook);
    document.getElementById('toggle-answer-test-btn').onclick = function () {
        testAllAnswersCorrect = !testAllAnswersCorrect;
        try { localStorage.setItem('allAnswersCorrectMode', String(testAllAnswersCorrect)); } catch (e) {}
        updateAnswerTestToggleButton();
    };
    updateAnswerTestToggleButton();
    document.getElementById('admin-panel').addEventListener('click', e => e.stopPropagation());
    document.getElementById('admin-overlay').addEventListener('click', closeAdminPanel);
    document.getElementById('admin-close').onclick = closeAdminPanel;

    // Restore progress
    const saved = loadProgress();
    if (saved) {
        shuffledQuestions = saved.shuffledQuestions;
        questionIndex = saved.questionIndex;
        totalCorrect = saved.totalCorrect;
        totalWrong = saved.totalWrong;
        startQuiz(true);
    }
})();
</script>
</body>
</html>
